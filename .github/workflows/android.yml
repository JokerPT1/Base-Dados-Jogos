name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # 1. Cria ficheiros de configuração falsos para o compilador não queixar-se
    # (Já que o teu Gradle exige o Secrets Plugin e Google Services)
    - name: Create Missing Config Files
      run: |
        echo "MAPS_API_KEY=mock_key" > .env
        echo "echo 'mock'" > .env.example
        echo '{"project_info":{"project_number":"1","project_id":"mock"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1"},"api_key":[{"current_key":"mock"}]}]}' > app/google-services.json

    # 2. Descodifica a tua Keystore permanente na raiz do projeto
    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

    # 3. Dá permissão ao script de compilação do Android
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 4. Compila o APK usando o comando nativo do Android
    - name: Build Release APK
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    # 5. Disponibiliza o APK final para download na aba Actions
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameReseller-Release
        path: app/build/outputs/apk/release/app-release.apk
