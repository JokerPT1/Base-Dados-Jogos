name: Build Android APK with Custom Action

on:
  push:
    branches: [ main ] # Corre sempre que envias código para a main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Cria o ficheiro keystore na raiz do projeto a partir do teu segredo Base64
    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

    # 2. Executa a compilação usando o teu fork da Action
    - name: Run APK Builder Action
      uses: JokerPT1/apk-builder-action@master
      env:
        # Injeta os teus segredos do GitHub como variáveis de ambiente para o Gradle ler
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      with:
        # Passa os parâmetros esperados pela tua action (ajusta se o teu fork pedir caminhos diferentes)
        build-root-dir: '.'
